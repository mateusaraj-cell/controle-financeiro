<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Controle Financeiro PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  background:#0f172a;
  color:white;
}

.menu {
  width:240px;
  background:#020617;
}

.menu button {
  width:100%;
  padding:14px;
  border:none;
  background:none;
  color:white;
  text-align:left;
  cursor:pointer;
}

.menu button:hover {
  background:#1e293b;
}

.conteudo {
  flex:1;
  padding:20px;
}

.tela { display:none; }
.tela.ativa { display:block; }

.card {
  background:#1e293b;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

input, select {
  margin:5px;
  padding:8px;
}

button.acao {
  padding:8px 12px;
}
</style>
</head>

<body>

<div class="menu">
  <button onclick="abrir('dashboard')">📊 Dashboard</button>
  <button onclick="abrir('fixos')">📌 Contas Fixas</button>
  <button onclick="abrir('pessoal')">💳 Pessoal Cartão</button>
  <button onclick="abrir('terceiros')">👥 Terceiros Cartão</button>
  <button onclick="abrir('receber')">💰 Receber Terceiros</button>
  <button onclick="abrir('config')">⚙️ Configurações</button>
</div>

<div class="conteudo">

<!-- DASHBOARD -->
<div id="dashboard" class="tela ativa">
  <h2>Dashboard</h2>
  <h3>Total: R$ <span id="total">0</span></h3>
</div>

<!-- FIXOS -->
<div id="fixos" class="tela">
  <h2>Contas Fixas</h2>

  <input id="fixoDesc" placeholder="Descrição">
  <input id="fixoValor" type="number" placeholder="Valor">
  <button class="acao" onclick="addFixo()">Adicionar</button>

  <div id="listaFixos"></div>
</div>

<!-- PESSOAL -->
<div id="pessoal" class="tela">
  <h2>Pessoal Cartão</h2>

  <input id="descP" placeholder="Descrição">
  <input id="valorP" type="number" placeholder="Valor">
  <input id="parcelasP" type="number" value="1">

  <button class="acao" onclick="addPessoal()">Adicionar</button>

  <div id="listaPessoal"></div>
</div>

<!-- TERCEIROS -->
<div id="terceiros" class="tela">
  <h2>Terceiros Cartão</h2>

  <input id="descT" placeholder="Descrição">
  <input id="pessoaT" placeholder="Pessoa">
  <input id="valorT" type="number" placeholder="Valor">
  <input id="parcelasT" type="number" value="1">

  <button class="acao" onclick="addTerceiro()">Adicionar</button>

  <div id="listaTerceiros"></div>
</div>

<!-- RECEBER -->
<div id="receber" class="tela">
  <h2>Receber Terceiros</h2>

  <input id="fNome" placeholder="Nome">
  <input id="fMes" placeholder="Ex: 6/2026">

  <button class="acao" onclick="buscarReceber()">Buscar</button>

  <div id="resultado"></div>
</div>

<!-- CONFIG -->
<div id="config" class="tela">
  <h2>Configurações</h2>
  <p>(expansão futura: cartões, categorias)</p>
</div>

</div>

<script>

function abrir(t){
  document.querySelectorAll(".tela").forEach(el => el.classList.remove("ativa"));
  document.getElementById(t).classList.add("ativa");
}

let dados = JSON.parse(localStorage.getItem("dados")) || [];

// FIXOS
function addFixo(){
  let d = document.getElementById("fixoDesc").value;
  let v = parseFloat(document.getElementById("fixoValor").value);

  if(!d || isNaN(v)) return;

  dados.push({tipo:"fixo", desc:d, valor:v});
  salvar();
}

// PESSOAL
function addPessoal(){
  let d = document.getElementById("descP").value;
  let v = parseFloat(document.getElementById("valorP").value);
  let p = parseInt(document.getElementById("parcelasP").value);

  if(!d || isNaN(v) || isNaN(p)) return;

  let vp = v/p;

  for(let i=1;i<=p;i++){
    let data = new Date();
    data.setMonth(data.getMonth()+(i-1));

    dados.push({
      tipo:"pessoal",
      desc:d+" ("+i+"/"+p+")",
      valor:vp,
      data:data
    });
  }

  salvar();
}

// TERCEIROS
function addTerceiro(){
  let d = document.getElementById("descT").value;
  let nome = document.getElementById("pessoaT").value;
  let v = parseFloat(document.getElementById("valorT").value);
  let p = parseInt(document.getElementById("parcelasT").value);

  if(!d || !nome || isNaN(v) || isNaN(p)) return;

  let vp = v/p;

  for(let i=1;i<=p;i++){
    let data = new Date();
    data.setMonth(data.getMonth()+(i-1));

    dados.push({
      tipo:"terceiro",
      pessoa:nome,
      desc:d+" ("+i+"/"+p+")",
      valor:vp,
      data:data
    });
  }

  salvar();
}

// RECEBER
function buscarReceber(){

  let nome = document.getElementById("fNome").value;
  let mes = document.getElementById("fMes").value;

  let total=0;
  let html="";

  dados.forEach(d=>{

    if(d.tipo==="terceiro"){
      let dt=new Date(d.data);
      let m=(dt.getMonth()+1)+"/"+dt.getFullYear();

      if(d.pessoa===nome && m===mes){
        total+=d.valor;
        html+=`<div class="card">${d.desc} - R$ ${d.valor}</div>`;
      }
    }
  });

  html+=`<h3>Total: R$ ${total.toFixed(2)}</h3>`;
  document.getElementById("resultado").innerHTML=html;
}

// SALVAR
function salvar(){
  localStorage.setItem("dados", JSON.stringify(dados));
  atualizar();
}

// ATUALIZAR
function atualizar(){

  let total=0;

  let lf=document.getElementById("listaFixos");
  let lp=document.getElementById("listaPessoal");
  let lt=document.getElementById("listaTerceiros");

  lf.innerHTML="";
  lp.innerHTML="";
  lt.innerHTML="";

  dados.forEach(d=>{

    total+=d.valor;

    let item=`<div class="card">${d.desc} - R$ ${d.valor}</div>`;

    if(d.tipo==="fixo") lf.innerHTML+=item;
    if(d.tipo==="pessoal") lp.innerHTML+=item;
    if(d.tipo==="terceiro") lt.innerHTML+=item;

  });

  document.getElementById("total").innerText=total.toFixed(2);
}

atualizar();

</script>

</body>
</html>
