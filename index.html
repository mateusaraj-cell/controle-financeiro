<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Controle Financeiro PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  background:#0a1225;
  color:white;
}

/* MENU (NÃO ALTERADO visual base) */
.menu {
  width:220px;
  background:#0b1a33;
  padding-top:15px;
  height:100vh;
  position:fixed;   /* fixa na tela ✅ */
}

.conteudo {
  margin-left:220px;  /* evita sobreposição ✅ */
}


.menu button {
  width:100%;
  padding:12px 15px;
  border:none;
  background:none;
  color:#d1d5db;
  text-align:left;
  cursor:pointer;
  font-size:14px;
}

.menu button:hover {
  background:#162447;
  color:white;
}

/* CONTEUDO */
.conteudo {
  flex:1;
  padding:25px;
}

/* TELAS */
.tela { display:none; }
.tela.ativa { display:block; }

/* CARDS (leve melhoria) */
.card {
  background:#111c3a;
  padding:10px;
  margin-top:8px;
  border-radius:5px;
}

/* INPUT */
input {
  margin:5px;
  padding:7px;
  border-radius:4px;
  border:none;
  background:#162447;
  color:white;
}

/* BOTÃO */
button.acao {
  padding:7px 12px;
  margin-top:8px;
  border:none;
  border-radius:4px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button.acao:hover {
  background:#1d4ed8;
}

/* TITULO */
h2 {
  margin-bottom:10px;
}

h3 {
  color:#60a5fa;
}
</style>

</head>

<body>

<div class="menu">

  <button onclick="abrir('dashboard')">📊 Dashboard</button>
  <button onclick="abrir('fixos')">📌 Contas Fixas</button>
  <button onclick="abrir('pessoal')">💳 Pessoal Cartão</button>
  <button onclick="abrir('terceiros')">👥 Terceiros Cartão</button>
  <button onclick="abrir('receber')">💰 Receber Terceiros</button>
  <button onclick="abrir('config')">⚙️ Configurações</button>

</div>

<div class="conteudo">

<!-- DASHBOARD -->
<div id="dashboard" class="tela ativa">
  <h2>Dashboard</h2>
  <h3>Total: R$ <span id="total">0</span></h3>
</div>

<!-- FIXOS -->
<div id="fixos" class="tela">
  <h2>Contas Fixas</h2>

  <input id="fixoDesc" placeholder="Descrição">
  <input id="fixoValor" type="number" placeholder="Valor">

  <button class="acao" onclick="addFixo()">Adicionar</button>

  <div id="listaFixos"></div>
</div>

<!-- PESSOAL -->
<div id="pessoal" class="tela">
  <h2>Pessoal Cartão</h2>

  <input id="descP" placeholder="Descrição">
  <input id="valorP" type="number" placeholder="Valor">
  <input id="parcelasP" type="number" value="1">
  <select id="cartaoP"></select>
  <button class="acao" onclick="addPessoal()">Adicionar</button>

  <div id="listaPessoal"></div>
</div>

<!-- TERCEIROS -->
<div id="terceiros" class="tela">
  <h2>Terceiros Cartão</h2>

  <input id="descT" placeholder="Descrição">
  <input id="pessoaT" placeholder="Pessoa">
  <input id="valorT" type="number" placeholder="Valor">

  <button class="acao" onclick="addTerceiro()">Adicionar</button>

  <div id="listaTerceiros"></div>
</div>

<!-- RECEBER -->
<div id="receber" class="tela">
  <h2>Receber Terceiros</h2>

  <input id="buscaNome" placeholder="Nome">

  <button class="acao" onclick="buscar()">Buscar</button>

  <div id="resultado"></div>
</div>

<!-- CONFIG -->
<div id="config" class="tela">
  <h2>Configurações</h2>

  <h4>💰 Salário</h4>
  <input id="salario1" placeholder="Salário 1">
  <input id="salario2" placeholder="Salário 2">
  <button class="acao" onclick="salvarSalario()">Salvar</button>

  <div id="salarioTotal"></div>

  <hr>

  <h4>💳 Cartões</h4>
  <input id="novoCartao" placeholder="Novo cartão">
  <button class="acao" onclick="addCartao()">Adicionar</button>
  <div id="listaCartoes"></div>

  <hr>

  <h4>👥 Pessoas</h4>
  <input id="novaPessoa" placeholder="Nome">
  <button class="acao" onclick="addPessoa()">Adicionar</button>
  <div id="listaPessoas"></div>

  <hr>

  <h4>📊 Categorias</h4>
  <input id="novaCategoria" placeholder="Categoria">
  <button class="acao" onclick="addCategoria()">Adicionar</button>
  <div id="listaCategorias"></div>

</div>

<script>

function abrir(tela){
  document.querySelectorAll(".tela").forEach(el => el.classList.remove("ativa"));
  document.getElementById(tela).classList.add("ativa");
}

let dados = JSON.parse(localStorage.getItem("dados")) || [];
let config = JSON.parse(localStorage.getItem("config")) || {
  salario1: 0,
  salario2: 0,
  cartoes: [],
  pessoas: [],
  categorias: []
};

// SALÁRIO
function salvarSalario(){
  config.salario1 = parseFloat(document.getElementById("salario1").value) || 0;
  config.salario2 = parseFloat(document.getElementById("salario2").value) || 0;

  salvarConfig();
}

function atualizarSalario(){
  let total = config.salario1 + config.salario2;

  document.getElementById("salarioTotal").innerHTML =
    "<h3>Total: R$ " + total.toFixed(2) + "</h3>";
}

// CARTÕES
function addCartao(){
  let nome = document.getElementById("novoCartao").value;
  if(!nome) return;

  config.cartoes.push(nome);
  salvarConfig();
}

// PESSOAS
function addPessoa(){
  let nome = document.getElementById("novaPessoa").value;
  if(!nome) return;

  config.pessoas.push(nome);
  salvarConfig();
}

// CATEGORIAS
function addCategoria(){
  let nome = document.getElementById("novaCategoria").value;
  if(!nome) return;

  config.categorias.push(nome);
  salvarConfig();
}

// SALVAR CONFIG
function salvarConfig(){
  localStorage.setItem("config", JSON.stringify(config));

  atualizarConfig();

  carregarCartoes();     // ✅ atualiza select de cartões
  carregarPessoas();     // ✅ atualiza select de pessoas
}

// ATUALIZAR TELA
function atualizarConfig(){

  atualizarSalario();

  document.getElementById("listaCartoes").innerHTML =
    config.cartoes.map(c => `<div class="card">${c}</div>`).join("");

  document.getElementById("listaPessoas").innerHTML =
    config.pessoas.map(p => `<div class="card">${p}</div>`).join("");

  document.getElementById("listaCategorias").innerHTML =
    config.categorias.map(c => `<div class="card">${c}</div>`).join("");
}

// INICIAR
atualizarConfig();

function addFixo(){
  let d = document.getElementById("fixoDesc").value;
  let v = parseFloat(document.getElementById("fixoValor").value);
  if(!d || isNaN(v)) return;

  dados.push({tipo:"fixo", desc:d, valor:v});
  salvar();
}

function addPessoal(){
  let d = document.getElementById("descP").value;
  let v = parseFloat(document.getElementById("valorP").value);
  let p = parseInt(document.getElementById("parcelasP").value);
  if(!d || isNaN(v) || isNaN(p)) return;

  let vp = v / p;

  for(let i=1;i<=p;i++){
    dados.push({
      tipo:"pessoal",
      desc:d+" ("+i+"/"+p+")",
      valor:vp
    });
  }

  salvar();
}

function addTerceiro(){
  let d = document.getElementById("descT").value;
  let nome = document.getElementById("pessoaT").value;
  let v = parseFloat(document.getElementById("valorT").value);

  if(!d || !nome || isNaN(v)) return;

  dados.push({
    tipo:"terceiro",
    desc:d,
    pessoa:nome,
    valor:v
  });

  salvar();
}

function buscar(){
  let nome = document.getElementById("buscaNome").value;

  let total=0;
  let html="";

  dados.forEach(d=>{
    if(d.tipo==="terceiro" && d.pessoa===nome){
      total+=d.valor;
      html+=`<div class="card">${d.desc} - R$ ${d.valor}</div>`;
    }
  });

  html+=`<h3>Total: R$ ${total.toFixed(2)}</h3>`;
  document.getElementById("resultado").innerHTML = html;
}

function salvar(){
  localStorage.setItem("dados", JSON.stringify(dados));
  atualizar();
}

function atualizar(){

  let total=0;

  let lf=document.getElementById("listaFixos");
  let lp=document.getElementById("listaPessoal");
  let lt=document.getElementById("listaTerceiros");

  lf.innerHTML="";
  lp.innerHTML="";
  lt.innerHTML="";

  dados.forEach(d=>{
    total += d.valor;

    let item=`<div class="card">${d.desc} - R$ ${d.valor}</div>`;

    if(d.tipo==="fixo") lf.innerHTML+=item;
    if(d.tipo==="pessoal") lp.innerHTML+=item;
    if(d.tipo==="terceiro") lt.innerHTML+=item;
  });

  document.getElementById("total").innerText = total.toFixed(2);
}

function carregarCartoes(){
  let select = document.getElementById("cartaoP");

  if(!select) return;

  select.innerHTML = "";

  config.cartoes.forEach(c => {
    select.innerHTML += `<option>${c}</option>`;
  });
}

atualizar();
carregarCartoes();
carregarPessoas();  // 👈 se já tiver essa função
``

</script>

</body>
</html>
