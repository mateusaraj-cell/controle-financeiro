<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Controle Financeiro PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  background:#0a1225;
  color:white;
}

.menu {
  width:220px;
  background:#0b1a33;
  height:100vh;
  position:fixed;
}

.menu button {
  width:100%;
  padding:12px;
  border:none;
  background:none;
  color:#d1d5db;
  text-align:left;
  cursor:pointer;
}

.menu button:hover {
  background:#162447;
}

.conteudo {
  margin-left:220px;
  padding:20px;
  flex:1;
}

.tela { display:none; }
.tela.ativa { display:block; }

.card {
  background:#111c3a;
  padding:10px;
  margin-top:8px;
}

input, select {
  margin:5px;
  padding:6px;
}

button.acao {
  margin-top:8px;
  padding:6px;
  background:#2563eb;
  border:none;
  color:white;
}
</style>
</head>

<body>

<div class="menu">
  <button onclick="abrir('dashboard')">📊 Dashboard</button>
  <button onclick="abrir('lancamentos')">🧾 Lançamentos</button>
  <button onclick="abrir('fixos')">📌 Contas Fixas</button>
  <button onclick="abrir('pessoal')">💳 Pessoal Cartão</button>
  <button onclick="abrir('terceiros')">👥 Terceiros Cartão</button>
  <button onclick="abrir('receber')">💰 Receber</button>
  <button onclick="abrir('config')">⚙️ Configurações</button>
</div>

<div class="conteudo">

<div id="dashboard" class="tela ativa">
  <h2>Dashboard</h2>
  <h3>Total: R$ <span id="total">0</span></h3>
</div>

<div id="lancamentos" class="tela">
  <h2>Lançamentos</h2>

  <input id="desc" placeholder="Descrição">

  <select id="tipo">
    <option value="fixo">Fixo</option>
    <option value="pessoal">Pessoal Cartão</option>
    <option value="terceiro">Terceiros Cartão</option>
  </select>

  <input id="valor" type="number" placeholder="Valor">
  <input id="parcelas" type="number" value="1">

  <select id="cartao"></select>
  <select id="pessoa"></select>
  <select id="categoria"></select>

  <button class="acao" onclick="addLancamento()">Adicionar</button>
</div>

<div id="fixos" class="tela"><h2>Fixos</h2><div id="listaFixos"></div></div>
<div id="pessoal" class="tela"><h2>Pessoal</h2><div id="listaPessoal"></div></div>
<div id="terceiros" class="tela"><h2>Terceiros</h2><div id="listaTerceiros"></div></div>

<div id="receber" class="tela">
  <h2>Receber</h2>
  <input id="buscaNome" placeholder="Nome">
  <button onclick="buscar()">Buscar</button>
  <div id="resultado"></div>
</div>

<div id="config" class="tela">
  <h2>Configurações</h2>

  <input id="novoCartao" placeholder="Cartão">
  <button onclick="addCartao()">Adicionar</button>
  <div id="listaCartoes"></div>

  <input id="novaPessoa" placeholder="Pessoa">
  <button onclick="addPessoa()">Adicionar</button>
  <div id="listaPessoas"></div>

  <input id="novaCategoria" placeholder="Categoria">
  <button onclick="addCategoria()">Adicionar</button>
  <div id="listaCategorias"></div>
</div>

</div>

<script>

function abrir(tela){
  document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
  document.getElementById(tela).classList.add("ativa");
}

let dados = JSON.parse(localStorage.getItem("dados")) || [];
let config = JSON.parse(localStorage.getItem("config")) || {
  cartoes: [],
  pessoas: [],
  categorias: []
};

function salvar(){
  localStorage.setItem("dados", JSON.stringify(dados));
  atualizar();
}

function salvarConfig(){
  localStorage.setItem("config", JSON.stringify(config));
  atualizarConfig();
  carregarSelects();
}

// CONFIG
function addCartao(){
  let v = document.getElementById("novoCartao").value;
  if(!v) return;
  config.cartoes.push(v);
  salvarConfig();
}

function addPessoa(){
  let v = document.getElementById("novaPessoa").value;
  if(!v) return;
  config.pessoas.push(v);
  salvarConfig();
}

function addCategoria(){
  let v = document.getElementById("novaCategoria").value;
  if(!v) return;
  config.categorias.push(v);
  salvarConfig();
}

function atualizarConfig(){
  document.getElementById("listaCartoes").innerHTML =
    config.cartoes.map(c=>`<div class="card">${c}</div>`).join("");

  document.getElementById("listaPessoas").innerHTML =
    config.pessoas.map(p=>`<div class="card">${p}</div>`).join("");

  document.getElementById("listaCategorias").innerHTML =
    config.categorias.map(c=>`<div class="card">${c}</div>`).join("");
}

// SELECTS
function carregarSelects(){

  let c = document.getElementById("cartao");
  if(c){
    c.innerHTML="";
    config.cartoes.forEach(x=>c.innerHTML+=`<option>${x}</option>`);
  }

  let p = document.getElementById("pessoa");
  if(p){
    p.innerHTML="";
    config.pessoas.forEach(x=>p.innerHTML+=`<option>${x}</option>`);
  }

  let cat = document.getElementById("categoria");
  if(cat){
    cat.innerHTML="";
    config.categorias.forEach(x=>cat.innerHTML+=`<option>${x}</option>`);
  }
}

// LANÇAMENTO
function addLancamento(){

  let desc = document.getElementById("desc").value;
  let tipo = document.getElementById("tipo").value;
  let valor = parseFloat(document.getElementById("valor").value);
  let parcelas = parseInt(document.getElementById("parcelas").value) || 1;

  if(!desc || isNaN(valor)) return;

  let v = valor / parcelas;

  for(let i=1;i<=parcelas;i++){
    dados.push({
      tipo,
      desc: desc+" ("+i+"/"+parcelas+")",
      valor: v
    });
  }

  salvar();
}

// BUSCAR
function buscar(){
  let nome = document.getElementById("buscaNome").value;
  let total=0;
  let html="";

  dados.forEach(d=>{
    if(d.tipo==="terceiro" && d.pessoa===nome){
      total+=d.valor;
      html+=`<div class="card">${d.desc} - R$ ${d.valor}</div>`;
    }
  });

  html+=`<h3>Total: R$ ${total.toFixed(2)}</h3>`;
  document.getElementById("resultado").innerHTML=html;
}

// ATUALIZAR
function atualizar(){

  let total=0;

  let lf=document.getElementById("listaFixos");
  let lp=document.getElementById("listaPessoal");
  let lt=document.getElementById("listaTerceiros");

  lf.innerHTML="";
  lp.innerHTML="";
  lt.innerHTML="";

  dados.forEach(d=>{
    total+=d.valor;

    let item=`<div class="card">${d.desc} - R$ ${d.valor}</div>`;

    if(d.tipo==="fixo") lf.innerHTML+=item;
    if(d.tipo==="pessoal") lp.innerHTML+=item;
    if(d.tipo==="terceiro") lt.innerHTML+=item;
  });

  document.getElementById("total").innerText=total.toFixed(2);
}

// INIT
atualizarConfig();
atualizar();
carregarSelects();

</script>

</body>
</html>
``
