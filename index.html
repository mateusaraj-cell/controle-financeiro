<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Controle Financeiro PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  background:#0f172a;
  color:white;
}

.menu {
  width:220px;
  background:#020617;
}

.menu button {
  width:100%;
  padding:15px;
  border:none;
  background:none;
  color:white;
  text-align:left;
  cursor:pointer;
}

.menu button:hover {
  background:#1e293b;
}

.conteudo {
  flex:1;
  padding:20px;
}

.tela { display:none; }
.tela.ativa { display:block; }

.card {
  background:#1e293b;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

input, select {
  margin:5px;
  padding:8px;
}

button.acao {
  padding:8px 12px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="menu">
  <button onclick="abrir('dashboard')">📊 Dashboard</button>
  <button onclick="abrir('lancar')">💳 Lançamentos</button>
  <button onclick="abrir('fatura')">📄 Fatura</button>
</div>

<div class="conteudo">

<!-- DASHBOARD -->
<div id="dashboard" class="tela ativa">
  <h2>Dashboard</h2>
  <h3>Total: R$ <span id="total">0</span></h3>
</div>

<!-- LANÇAMENTO -->
<div id="lancar" class="tela">
  <h2>Novo Lançamento</h2>

  <input id="desc" placeholder="Descrição">
  <input id="valor" type="number" placeholder="Valor">
  <input id="parcelas" type="number" value="1">

  <select id="cartao">
    <option>Nubank</option>
    <option>Itaú</option>
    <option>Inter</option>
  </select>

  <button class="acao" onclick="add()">Adicionar</button>

  <div id="lista"></div>
</div>

<!-- FATURA -->
<div id="fatura" class="tela">
  <h2>Fatura</h2>
  <div id="faturas"></div>
</div>

</div>

<script>

function abrir(id){
  document.querySelectorAll(".tela").forEach(t => t.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");
}

let dados = JSON.parse(localStorage.getItem("dados")) || [];

function add(){

  let desc = document.getElementById("desc").value;
  let valor = parseFloat(document.getElementById("valor").value);
  let parcelas = parseInt(document.getElementById("parcelas").value);
  let cartao = document.getElementById("cartao").value;

  if(!desc || isNaN(valor) || isNaN(parcelas)) return;

  let valorParcela = valor / parcelas;

  for(let i=1;i<=parcelas;i++){

    let data = new Date();
    data.setMonth(data.getMonth() + (i-1));

    dados.push({
      desc: desc + " ("+i+"/"+parcelas+")",
      valor: valorParcela,
      cartao: cartao,
      data: data
    });
  }

  localStorage.setItem("dados", JSON.stringify(dados));

  atualizar();
}

function atualizar(){

  let total = 0;
  let lista = document.getElementById("lista");
  let faturas = document.getElementById("faturas");

  lista.innerHTML = "";
  faturas.innerHTML = "";

  let agrupado = {};

  dados.forEach(d => {

    total += d.valor;

    lista.innerHTML += `
      <div class="card">
        ${d.desc} <br>
        R$ ${d.valor.toFixed(2)} <br>
        ${d.cartao}
      </div>
    `;

    let data = new Date(d.data);
    let mes = (data.getMonth()+1) + "/" + data.getFullYear();

    if(!agrupado[d.cartao]) agrupado[d.cartao] = {};
    if(!agrupado[d.cartao][mes]) agrupado[d.cartao][mes] = 0;

    agrupado[d.cartao][mes] += d.valor;
  });

  document.getElementById("total").innerText = total.toFixed(2);

  for(let cartao in agrupado){

    faturas.innerHTML += `<h3>${cartao}</h3>`;

    for(let mes in agrupado[cartao]){
      faturas.innerHTML += `
        <div class="card">
          ${mes} → R$ ${agrupado[cartao][mes].toFixed(2)}
        </div>
      `;
    }
  }
}

atualizar();

</script>

</body>
</html>
