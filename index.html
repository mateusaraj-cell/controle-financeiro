<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finance App</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin:0;
  font-family: 'Segoe UI', Arial;
  display:flex;
  background:#0b0f1a;
  color:white;
}

/* MENU */
.menu {
  width:240px;
  background:#111827;
  padding-top:20px;
}

.menu h2 {
  text-align:center;
  margin-bottom:30px;
  color:#a78bfa;
}

.menu button {
  width:90%;
  margin:5px auto;
  display:block;
  padding:14px;
  border:none;
  background:none;
  color:#cbd5e1;
  text-align:left;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.menu button:hover {
  background:#1f2937;
  color:white;
}

/* CONTEÚDO */
.conteudo {
  flex:1;
  padding:30px;
}

/* TELAS */
.tela {
  display:none;
}

.tela.ativa {
  display:block;
}

/* CARDS */
.card {
  background:#111827;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* INPUTS */
input {
  margin:5px;
  padding:12px;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:white;
}

/* BOTÕES */
button.acao {
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#7c3aed;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button.acao:hover {
  background:#6d28d9;
}

/* TITULOS */
h2 {
  margin-bottom:15px;
}

h3 {
  color:#a78bfa;
}
</style>

</head>

<body>

<div class="menu">
  <h2>💳 Finance</h2>

  <button onclick="abrir('dashboard')">📊 Dashboard</button>
  <button onclick="abrir('fixos')">📌 Fixos</button>
  <button onclick="abrir('pessoal')">💳 Pessoal</button>
  <button onclick="abrir('terceiros')">👥 Terceiros</button>
  <button onclick="abrir('receber')">💰 Receber</button>
</div>

<div class="conteudo">

<div id="dashboard" class="tela ativa">
  <h2>Dashboard</h2>
  <h3>Total: R$ <span id="total">0</span></h3>
</div>

<div id="fixos" class="tela">
  <h2>Contas Fixas</h2>

  <input id="fixoDesc" placeholder="Descrição">
  <input id="fixoValor" type="number" placeholder="Valor">

  <button class="acao" onclick="addFixo()">Adicionar</button>

  <div id="listaFixos"></div>
</div>

<div id="pessoal" class="tela">
  <h2>Pessoal</h2>

  <input id="descP" placeholder="Descrição">
  <input id="valorP" type="number" placeholder="Valor">
  <input id="parcelasP" type="number" value="1">

  <button class="acao" onclick="addPessoal()">Adicionar</button>

  <div id="listaPessoal"></div>
</div>

<div id="terceiros" class="tela">
  <h2>Terceiros</h2>

  <input id="descT" placeholder="Descrição">
  <input id="pessoaT" placeholder="Pessoa">
  <input id="valorT" type="number" placeholder="Valor">

  <button class="acao" onclick="addTerceiro()">Adicionar</button>

  <div id="listaTerceiros"></div>
</div>

<div id="receber" class="tela">
  <h2>Receber</h2>

  <input id="buscaNome" placeholder="Nome">

  <button class="acao" onclick="buscar()">Buscar</button>

  <div id="resultado"></div>
</div>

</div>

<script>

function abrir(tela){
  document.querySelectorAll(".tela").forEach(el => el.classList.remove("ativa"));
  document.getElementById(tela).classList.add("ativa");
}

let dados = JSON.parse(localStorage.getItem("dados")) || [];

// FIXOS
function addFixo(){
  let d = document.getElementById("fixoDesc").value;
  let v = parseFloat(document.getElementById("fixoValor").value);

  if(!d || isNaN(v)) return;

  dados.push({tipo:"fixo", desc:d, valor:v});
  salvar();
}

// PESSOAL
function addPessoal(){
  let d = document.getElementById("descP").value;
  let v = parseFloat(document.getElementById("valorP").value);
  let p = parseInt(document.getElementById("parcelasP").value);

  if(!d || isNaN(v) || isNaN(p)) return;

  let vp = v/p;

  for(let i=1;i<=p;i++){
    dados.push({
      tipo:"pessoal",
      desc:d+" ("+i+"/"+p+")",
      valor:vp
    });
  }

  salvar();
}

// TERCEIROS
function addTerceiro(){
  let d = document.getElementById("descT").value;
  let nome = document.getElementById("pessoaT").value;
  let v = parseFloat(document.getElementById("valorT").value);

  if(!d || !nome || isNaN(v)) return;

  dados.push({
    tipo:"terceiro",
    desc:d,
    pessoa:nome,
    valor:v
  });

  salvar();
}

// BUSCAR
function buscar(){
  let nome = document.getElementById("buscaNome").value;

  let total=0;
  let html="";

  dados.forEach(d=>{
    if(d.tipo==="terceiro" && d.pessoa===nome){
      total+=d.valor;
      html+=`<div class="card">${d.desc} - R$ ${d.valor}</div>`;
    }
  });

  html+=`<h3>Total: R$ ${total.toFixed(2)}</h3>`;

  document.getElementById("resultado").innerHTML=html;
}

// SALVAR / UPDATE
function salvar(){
  localStorage.setItem("dados", JSON.stringify(dados));
  atualizar();
}

function atualizar(){

  let total=0;

  let lf=document.getElementById("listaFixos");
  let lp=document.getElementById("listaPessoal");
  let lt=document.getElementById("listaTerceiros");

  lf.innerHTML="";
  lp.innerHTML="";
  lt.innerHTML="";

  dados.forEach(d=>{

    total+=d.valor;

    let item=`<div class="card">${d.desc} - R$ ${d.valor}</div>`;

    if(d.tipo==="fixo") lf.innerHTML+=item;
    if(d.tipo==="pessoal") lp.innerHTML+=item;
    if(d.tipo==="terceiro") lt.innerHTML+=item;

  });

  document.getElementById("total").innerText=total.toFixed(2);
}

atualizar();

</script>

</body>
</html>
